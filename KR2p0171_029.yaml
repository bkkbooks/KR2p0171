body:
  text: 病乾蔥鹽隋炙尻一華以封隋及少腹一冶策蓂少半升陳葵種一而一湮汲水三斗以龍須一束并者一久左足中指一三湮汲取杯水噴鼓三曰上有鋭某飲之而復其杯一及不出者方以醇酒入煮膠廣燔假火而焠酒中沸盡而去之以酒飲病者飲之令起自次殹不已有復如此數令一𤵸痛於脬及衷痛甚弱痛益甚治之黑叔三升以美醯三煮疾炊沸止火沸下復炊參沸止浚取汁牡厲一毒堇冶三凡二物取三指最到節一醯寒溫適入中飲飲先食後食次一飲病俞日一飲三日病已病已類石如泔從前出毋禁毋時冶厲毒堇不暴以夏日至到毒堇陰乾取葉實并冶裹以韋臧用取之歲更取毒堇毒堇堇葉異小赤莖葉從纗者葉實味苦前日至可六七日䅎澤旁令一以水一斗煮葵種一斗浚取其汁以其汁煮膠一廷半為汁一參而一贛戎鹽若美鹽盈隋有以塗隋下及其上而暴若一亨葵而飲其汁冬本沃以一亨葵熱啜其汁即隸以多為故而尻厥一以酒一咅漬襦頸及頭垢中令沸而飲之一𤵸弱不利脬盈者方取棗種屑二升葵種一升合撓三分之以水一斗半煮一分孰去滓有煮一分如此以盡三分浚取其汁以蜜和令毚甘寒溫適飲之藥盡更為病已而止令一𤵸取景天長尺大圍束一分以為三以淳酒半斗三𣱽煮之孰浚取其汁啜之不已復之不過三飲而已先莫毋食旦飲藥令一𤵸坎方尺有半深至肘即燒陳稿其中令其灰不盈半尺薄灑之以美酒莤莢一棗十四豙之朱臾椒合而一區燔之坎中以隧下已沃一𤵸燔陳芻若陳薪令病者北火炙之兩人為靡其尻𤵸已一以水一斗煮膠一參米一升孰而啜之夕毋食一取螺牛二七薤一并以酒煮而飲之一以己巳晨虒東鄉弱之不已復之一血𤵸煮荊三溫之而飲之一石𤵸三溫煮石韋若酒而飲之一膏𤵸澡石大若李㮖已食飲之不已復之一女子𤵸取三歲陳霍蒸而取其汁而飲之一女子𤵸煮隱夫木飲之居一日陽羹之一以醯酉三乃煮黍稷而飲其汁皆一以衣中衽緇約左手大指一三日
