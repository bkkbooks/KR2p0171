body:
  text: 加加以少嬰兒弱漬羖羊矢卒其時以傅之一冶雄黃以彘膏修少殽以醯令其寒溫適以傅之傅之毋濯先孰灑加以湯乃傅一冶僕纍以攻脂膳而傅傅炙之三四傅一刑赤蜴以血涂之一冶亭磿莁夷熬叔皆等以牡膏鱣血膳先以酒灑燔朴炙之乃傅一冶牛膝燔髶灰等并孰灑加而傅之炙牛肉以久脂涂其上雖已復傅勿擇一以脂若豹膏而炙之而不痛婁復之先飲美酒令身溫乃一善灑靡之血以水銀傅有以金冶末皆等以彘膏膳而傅之一壽慶良膳以醯封而炙之蟲環出一取慶良一斗去其甲足以烏豙五果礜大如李并以酨斗煮之汔以傅之一大皮桐以蓋而約之善一燔牡鼠矢冶以善酨膳而封之一燔礜冶烏豙黎盧蜀叔庶蜀椒桂各一合并和以頭脂布炙以尉卷而休一以小童弱漬陵𢻃以瓦器盛以布蓋置突上五六日傅之一冶莁夷苦瓠瓣并以彘膏辨傅之以布裹而約之一冶烏豙四果陵𢻃一升半以南潼弱一斗半并煮熟米一升入中撓以傅之一冶烏豙炙羖脂辨熱傅之一取陳葵莖燔冶之以彘職膏殽辨以傅痏一濡加冶巫夷半參以肥滿剡豶膏夷善以水灑加乾而傅之以布約之死人胻骨燔而治之以識膏一産痂先善以水灑而炙蛇膏令消傅三傅一痂方取三歲織豬膏傅之燔胕荊箕取其灰三已令一乾加冶蛇牀實以牡彘膏膳先括加潰即傅而乾去目一以金水銀穀汁和而傅之先以㳻滫傅一加方財冶犁盧以蜂駘辨和之即孰加而己嘗試毋禁
