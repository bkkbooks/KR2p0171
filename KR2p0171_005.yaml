body:
  text: 嬰兒病間嬰兒病間方取雷尾𡱁矢三果冶以豬煎膏和之小嬰兒以水半斗大者以一斗三分和取一分置水中撓以浴之浴之道頭上始下盡身四支毋濡三日一浴三日已已浴輒棄其水圂中間者身熱而數驚頸脊強而復大間多眾以此藥皆已
