body:
  text: 毒烏豙毒烏豙者炙飲小童弱若産齊赤而以水飲一屑勺藥以半杯以三指大捽飲之一取杞本長尺大如指削木臼中煮以酒一以汁粲叔若苦已一煮鐵飲之一禺人毒者取麋蕪本若薺一傅宥一穿地尺而煮水一甕一咅
