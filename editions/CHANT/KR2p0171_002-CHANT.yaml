body:
  text: 諸傷諸傷膏甘草各二桂畺椒毀一垸咅酒中飲之日壹飲以其一朐令大如荅即以赤荅一斗并復冶孰飲其汁汁宰皆索食之自次解痛斬一冶齊實淳酒漬而餅之煏瓦鬵炭漬煏之如即冶入三指最半咅溫酒者百冶大者八十小者𠦜冶精一燔白鷄毛及人髮冶等百草末八灰冶而一垸溫酒一咅中飲之一以刃傷羊矢傅之一止血出者燔髮以安其痏一令傷者毋痛毋血出取故蒲席厭燔痏一傷者血出祝曰男子竭女子酨五畫地之一令傷毋般取彘膏衍并冶傅之一以男子洎傅之皆不般一金傷者以方膏烏豙皆相煎釶之一傷者以續㡭根一把獨長支者二廷黃二梃甘草廷秋烏豙二者二甌即并煎孰以布捉取出其汁以陳縕傅之一者冶黃黔與彘膏之即以布捉取浘之一久傷者薺杏𩅢核中人以職膏弁封痏蟲即出嘗試一稍石直溫湯中以洒癰一令金傷毋痛方取鼢鼠乾而冶取彘魚燔而冶薪夷甘草各與鼢鼠等皆合撓取三指最一入溫酒一咅中而飲之不可財益藥至不癰而止令一令金傷毋痛取薺孰乾實令焦黑冶一根去皮冶二凡二物并和取三指最到節一醇酒盈一衷桮入藥中撓飲不者酒半桮已飲有頃不痛復痛飲藥如數不痛毋飲藥藥先食後食次治病時毋食魚彘肉馬肉龜蟲葷麻洙采毋近內病已如故治病毋時壹冶藥足治病藥已冶裹以繒臧治暴若有所燥冶令
