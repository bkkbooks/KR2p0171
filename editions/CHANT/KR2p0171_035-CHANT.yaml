body:
  text: 牡痔牡痔有蠃肉出或如鼠乳狀末大本小有空其中之疾久熱把其本小者而絕之取內戶旁祠空中黍腏燔死人頭皆冶以膱膏濡而入之其空中一多空者亨肥羭取其汁美黍米三斗炊之有以脩之孰分以為二以各一分即取蔉末菽醬之宰半并以傅痔空厚如韭葉即以厚布裹更溫二日而已一牡痔居竅旁大者如棗小者如棗𩅢者方以小角角之如孰二斗米頃而張角絜以小繩剖以刀其中有如兔若有堅血如抇末而出者即已令一牡痔之居竅㾾大如棗𩅢時養時痛者方先剶之弗能剶龜與地膽蟲相半和以傅之燔小隋石淬醯中以熨不已有復之如此數令
