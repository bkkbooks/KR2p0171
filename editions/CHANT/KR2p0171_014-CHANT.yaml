body:
  text: 蚖蚖蘭以酒沃飲其汁以宰封其痏數更之以熏一以葪印其中顛一以產豚豙麻之一以堇一陽筑封之即燔鹿角以弱飲之一吙𧪘年𧊝殺人今茲有復之一以青粱米為鬻水十五而米一成鬻五斗出揚去氣盛以新瓦罋冥口以布三即封涂厚二寸燔令泥盡火而𣤌之痏己一亨三宿雄鷄二洎水三斗孰而出及汁更洎以金逆甗下炊五㝅兔頭肉陀甗中稍沃以汁令下盂中孰飲汁一賁吙伏食父居北在母居南止同產三夫為人不德已不已青傅之一湮汲一咅入奚蠡中左承之北鄉鄉人禹步三問其名即曰某某年今飲半咅曰病已徐去徐已即復奚蠡去之一煮鹿肉若野彘肉食之𣤌汁精一燔貍皮冶灰入酒中飲之多可殹不傷人煮羊肉以汁之取井中泥以還封其傷已
