body:
  text: 久疕身疕疕毋名而養用陵叔𢻃芰熬冶之以犬膽和以傅之傅之久者輒停三日三疕已嘗試令一疕䪡葵漬以水夏日勿漬以傅之百疕盡已一以黎盧二礜一豕膏和而以熨疕一久疕不已乾夸竈漬以傅之已一行山中而疕出其身如牛目是胃日一露疕燔飯焦冶以久膏和傅一一以槐東鄉本枝葉三𣱽煮以汁一其祝曰浸浸蟲黃神在竈中遠黃神興一涿先以黍潘孰熟洒涿即燔數年陳藁其灰治傅涿已傅灰灰盡漬摹以捚去之已捚輒復傅灰捚如前雖久涿汁盡即可瘳矣傅藥時禁嘗試令一烝凍土以熨之一以兔產𡵩塗之一咀韰以封之一踐而涿者燔地穿而入足如食頃而已即葱封之若烝葱熨之
