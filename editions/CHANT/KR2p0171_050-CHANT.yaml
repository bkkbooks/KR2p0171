body:
  text: 蠱蠱者燔扁輻以荊薪即以食邪者一燔女子布以飲蠱而病者燔北鄉并符而烝羊尼以下湯敦符灰即病者沐浴為蠱者一病蠱者以烏雄鷄一蛇一并直瓦赤鋪中即蓋以東鄉竈炊之令鷄蛇盡燋即出而冶之令病者每旦以三指三最藥入一桮酒若鬻中而飲之日壹飲盡藥已一蠱漬女子未嘗丈夫者布咅冶桂入中令毋臭而以飲之
