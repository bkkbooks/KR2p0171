body:
  text: 蟲蝕蟲蝕在於𦞈若在它所其病所在曰𩅢毀而取而以洒之令僕僕然即以傅傅湯以羽靡即傅藥傅藥薄厚盈空而止明日有洒以湯傅藥如前日壹洒日壹傅藥三數肉產傷肉而止止即洒去藥已去藥即以彘疕瘳而止三日而肉產可八九日而傷平傷平十餘日而瘳如故傷欲裹之則裹之欲勿矣傅藥先旦未傅傅藥欲食即食服藥時一燔屚𥶌冶之以杜豬膏一取雄鷄矢燔以熏其痏鼠令自死煮以水布其汁中傅之毋以手操痏一蟲蝕取禹竈塞傷痏令一貣食口鼻冶葵以桑薪燔其令汁出以羽取一豦斬乘車䰍椁一食以豬肉肥者以一冶陳葵以一貣食齒以榆皮白美桂而并傅空
