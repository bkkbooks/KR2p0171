body:
  text: 䰍䰍唾曰歕桼三即曰天啻下若以桼弓矢今若為下民疕涂若以豕矢以履下靡抵之一祝曰啻右五兵壐亡不亡瀉刀為裝即唾之男子七女子二七一歕噴桼王若不能桼甲兵令某傷奚矢鼠襄涂桼王一鼠飲其一咅令人終身一䰍一傅之一以朝未食時傅病已如故治病毋時治病禁勿一以木薪炊五斗米孰之即時取狼牙根
