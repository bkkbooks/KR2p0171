body:
  text: 髹髹唾曰噴漆三即曰天啻下若以漆弓矢今若為下民疕塗若以豕矢以履下靡抵之一祝曰啻右五兵璽亡不亡瀉刀為裝即唾之男子七女子二七一噴噴漆王若不能漆甲兵令某傷奚矢鼠襄塗漆王一鼠飲其一咅令人終身一髹一傅之一以朝未食時傅病已如故治病毋時治病禁勿一以木薪炊五斗米孰之即時取狼牙根
