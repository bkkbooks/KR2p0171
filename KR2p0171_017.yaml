body:
  text: 白處白處方取灌青其一名灌曾取如鹽草分斗一竈黃土十分升一皆冶而指而先食飲之不已有復之而灌青再飲而已令一其與其真治之以鳥卵勿毀半斗甘鹽者其中卵次之以冥罋以布四三蔡已涂之即縣陰燥厚蔽肉扁施所而止之於熱弗能支而止而止施雖俞而毋去其藥藥而自殹已炙之之時食甚搜及毋手傅之以旦未食傅藥已傅藥即飲善酒極厭而止即炙已炙之而起欲食即食出入飲食自次旦服藥先毋食二三日服藥時毋食魚病已如故治病毋時二三月十五日到十七日取鳥卵已即用之鳥殹其卵雖有人猶可用殹此藥已成居雖十餘歲到歲俞良而乾不可以涂身少取藥足以涂施者以美醯之於瓦中漬之可河稍如恆煮膠即置其於𥠦火上令藥已成而發之發之涂冥以布蓋以縣之陰燥所十歲以前藥乃乾一白白者白毋奏取丹沙與鱣魚血若以雞血皆可雞湮居二之以蚤挈令赤以之二日灑以新布孰暨之復傅如此數卅日而止令
