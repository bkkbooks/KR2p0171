body:
  text: 乾騷乾騷方以雄黃二兩水銀兩少半頭脂一升雄黃靡水銀手雄黃孰撓之先孰灑騷以湯潰其灌撫以布令而傅之一夜一一熬陵豉一參令黃以淳酒半斗煮之三沸止𧈪其汁夕毋食飲一以般服零最取大者一枚壽壽之以脂辨之以為大丸操一取茹盧本齏之以酒漬之后日一夜而以塗之已一取犁盧二齊烏豙一齊礜一齊屈居齊芫華一齊并和以車故脂如裹善灑乾節炙裹樂以靡其騷靡脂脂騷即已一取闌根白付小刌一升舂之以酨沐相半洎之毚置溫所三日而入豬膏者一合其中因炊三沸以傅疥而炙之乾而復傅者居二日乃浴疥已令一煮桃葉三𣱽以為湯之溫內飲熱酒已即入湯中有飲熱酒其中雖久騷已一乾騷煮弱二斗令二升豕膏一升冶黎盧二升同傅之
