body:
  text: 牝痔牝痔之入竅中寸狀類牛幾三然後而潰出血不後上鄉者方取弱五斗以煮青蒿大把二鮒魚如手者七冶桂六寸乾薑二果十沸抒置甕中貍席下為竅以熏痔藥寒而休日三熏因敝飲藥將毋飲它為藥漿方取䓛莖乾冶二升取苽汁二斗以漬之以為漿飲之病已而已青蒿者荊名曰萩䓛者荊名曰盧茹其葉可亨而酸其莖有刺令一牝痔有空而欒血出者方取女子布燔置器中以熏痔三日而止令一牝痔之有數竅蟯白徒道出者方先道以滑夏鋌令血出穿地深尺半袤尺廣三寸燔炭其中假駱阮少半斗布炭上以布周蓋坐以熏下竅煙滅取肥肉置火中時自啓竅燒節火滅以日一熏下而五六日清駱阮一名曰白苦苦浸一痔者以醬灌黃雌雞令自死以菅裹塗上炮之塗乾食雞以羽熏纂一冶麋蕪本方風烏豙桂皆等漬以淳酒而垸之大如黑叔而吞之始食一不智益一為極有可以領傷恆先食食之一未有巢者煮一斗棗一斗膏以為四斗汁置般中而居之其蟲出一巢塞直者殺狗取其脬以穿籥入直中炊之引出徐以刀剶去其巢冶黃黔而婁傅之人州出不可入者以膏膏出者而到縣其人以寒水戔其心腹入矣血以弱孰煮一牡鼠以氣尉
