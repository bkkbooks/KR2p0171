body:
  text: 癰癰取羽二二禹步三一咅一癰自發者取桐本一節所以澤泔煮一癰種者取烏豙黎盧冶之之以尉潼所有可手令癰種者皆已一癰首取茈半斗細而以善酨六斗如此醫以此教惠一身有癰者曰睪敢告大山陵某不幸病癰我直百疾之我以明月炻照若寒以柞桯若以虎蚤抉取若刀而割若葦尾而刖若肉若不去苦唾朝日未食東鄉唾之一白茝白衡菌桂枯疆薪雉夷凡五物等已冶五物取牛脂細布并以金銚煏桑炭毚岪發有復煏岪如此布抒取汁即取水銀靡掌中以和藥傅旦以濡漿細之傅藥毋食彘肉魚及女子已面類者一身有體癰種者方取牡一夸就炊之候其洎不盡一斗抒臧之稍取以塗身𦡊種者而炙之癰種盡去已嘗試令一頤癰者冶半夏一牛煎脂二醯六并以鼎如以傅勿盡傅圜一寸乾復傅之而以湯灑去藥已矣
