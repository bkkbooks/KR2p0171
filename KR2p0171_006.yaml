body:
  text: 嬰兒瘛嬰兒瘛嬰兒瘈者目繲然脅痛息癭癭然𡱁不化而青取屋榮蔡薪燔之而匕焉為湮汲三渾盛以杯因唾匕祝之曰噴者豦噴上如星下如䏽血取若門左斬若門右為若不已磔薄若市因以匕周抿嬰兒瘛所而灑之杯水中候之有血如蠅羽者而棄之於垣更取水復唾匕以抿如前毋徵數復之徵盡而止令
