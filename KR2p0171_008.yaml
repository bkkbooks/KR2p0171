body:
  text: 犬筮人犬筮人傷者取丘引矢二升以井上罋㡭處土與等并熬之而以美醯之稍垸以熨其傷犬毛盡傅傷而已一煮莖以汁洒之冬日煮其本一犬所齧令毋痛及易瘳方令齧者卧而令人以酒財沃其傷已沃而越之嘗試毋禁
