body:
  text: 腸穨操柏杵禹步三曰賁者一襄胡濆者二襄胡濆者三襄胡柏杵臼穿一母一獨有三賁者潼若以柏杵七令某毋一必令同族抱穨者直東鄉窗道外𢻰椎之一令斬足者清明東鄉以筩䞣之二七一𤵸以月十六日始毀禹步三曰月與日相當日與月相當各三父乖母強等與人產子獨產穨亢乖已操葮石𣪠而母即以鐵椎𢻰段之二七以日出為之令穨者東鄉一漬女子布以汁亨肉食之欼其汁一破卵咅醯中飲之一炙蠶卵令簍簍黃冶之三指最至節入半咅酒中飲之三四日一以辛巳日古曰賁辛巳日三曰天神下干疾神女倚序聽神吾某狐㕚非其處所已不已斧斬若即操布𢻰之二七一以日出時令穨者屋霤下東鄉令人操築西鄉祝曰今日某穨尢今日已某穨已而父與母皆盡柏築之顛父而衝子胡不已之有以築衝穨二七已備即曰某起穨已一以辛卯日立堂下東鄉鄉日今人挾提穨者曰今日辛卯更名曰禹一取枲垢以艾裹以久穨者中顛令闌而已一令穨者北首卧北鄉廡中禹步三步嘑曰吁狐麃三若智某病狐一𥢢及癭取死者叕烝之而新布裹以囊前行一陰乾之旁逢卵以布裹一穨者及股癰鼠復者中指蚤二七必瘳一以稈為弓以甗衣為弦以葛為矢以羽旦而射莫而小一以冥蠶種方尺食衣白魚一七長足二七熬蠶種令黃靡取蠶種冶亦靡白魚長足節三并以醯二升和以先食飲之嬰以一升一穿小瓠壺令其空盡容穨者腎與即令穨者煩夸東鄉坐於東陳垣下即內腎於壺空中而以采為四寸杙二七即以采木椎窡之一再靡之已窡輒椄杙垣下以盡二七杙而已為之恒以入月旬六日盡日一為再為之為之恒以星出時為之須穨已而止一𥢢先上卵引下其皮以𥐗穿其隋旁汁及膏撓以醇有久其痏勿令風及易瘳而久其泰陰泰陽令一治穨初發傴攣而未大者方取全虫蛻一皆燔酒飲財足以醉男女皆可令一穨以奎蠡蓋其堅即取桃支東鄉者以為弧取母上晦壹射以三矢飲樂其藥曰陰乾黃牛膽乾即稍飲之一冶囷桂尺獨一升并冶而盛竹甬中盈筩即蓂以布而傅之隋下為二處即道其之炊者必順其身須其身安定穨己敬以豚塞以為不仁以白縣茅比所且塞壽以為一取女子月事布漬灸之令溫四榮蔡燔量簧冶桂五寸上穨久左胻一夕毋食旦取丰卵一漬美醯一桮以飲之
