  text: 狂犬齧人狂犬齧人取恒石兩以相靡殹取其靡如麋者以傅犬所齧者已矣一狂犬齧人者孰澡湮汲注咅中小多如再食浖取竈末灰三指最水中以飲病者已飲令孰奮兩手如間手道狂犬齧者莫傅一狂犬傷人冶礜與橐莫醯半咅飲之女子同藥如
