body:
  text: 朐養朐養痔痔者其直旁有小空空兌兌然出時從其空出有白蟲時從其空出其直痛尋然類辛狀治之以柳菌一捼艾二凡二物為穿地令廣深大如䀁燔所穿地令之乾而置艾其中置柳菌艾上而燔其艾菌而取䀁穿其斷令其大圜寸以復之以土雍䀁會毋烟能即被䀁以衣而毋蓋其䀁空即令痔者居䀁令直直䀁空令烟熏直熏直熱則舉之寒則下之圈而休一取石大如卷二七孰燔之善伐米大半升水八米取石置中孰即啜之而已
