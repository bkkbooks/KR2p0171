body:
  text: 胻傷胻傷取久溺中泥善擇去其蔡沙石置泥器中旦以苦酒以泥傅傷傅之傷已己用一胻久傷胻久傷者癰癰潰汁如靡治之煮水二斗鬱一參𦬸一參一參凡三物鬱𦬸皆冶湯中即炊湯湯溫適可入足即置小木湯中即居入足湯中踐木滑湯寒則炊之熱即止火自適殹朝已食而入湯中到餔時出休病即俞矣病不者一入湯中即瘳其甚者五六入湯中而瘳其瘳殹癰癰而新肉產肉產即毋入湯中矣即自合而瘳矣服藥時毋禁及治病毋時令
