body:
  text: 雎病雎病冶白蘞黃蓍芍樂桂疆椒朱臾凡七物骨雎倍白蘞肉雎倍黃蓍腎雎倍芍藥其餘各一并以三指大最一入杯酒中日五六飲之須已一三𣱽煮逢虆取汁四斗以灑雎癰一雎始起取啇牢漬醯中以尉其種處一雎以白蘞黃蓍芍藥甘草四物者疆蜀焦樹臾四物而當一物其一骨三以酒一杯筋者倏倏翟翟之其日四飲一欲潰止一者方以斗已灑雎以羹一雎未烏豙十四果以美醯半升澤泔二參入藥中令如炙手以靡傅之以餘藥封而裹不痛己令一益雎者白蘞三罷合一并冶飲之一爛疽爛疽者起而冶以彘膏未湔者灸銷以和傅之日一傅樂傅樂前灑以溫水服藥卅日已嘗試令一諸疽物初發者取大叔一斗熬孰即急抒置甑置其醇酒一斗淳之即取其汁盡飲之一飲病未已飲之可不過數飲病已毋禁嘗試令一血雎始發以熱痛毋適雎戴黃芩白𧁴皆居三日之令汗出到足已一氣雎始發溳溳以如狀靡而二果令叔熬可以酒沃即浚出而止一雎發出禮如人𣨛之人擕之甚半斗煮成三升飲之溫衣卧一豙雖一雎橿桂椒居四淳酒半斗煮令成三升一三細切淳酒一斗即而之溫衣一桂椒一煮麥麥孰以汁灑之膏一炙梓葉溫之
