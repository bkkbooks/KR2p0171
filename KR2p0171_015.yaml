body:
  text: 尤者尤取敝蒲席若籍之弱繩之即燔其末以久尤末熱即拔尤去之一令尤者抱禾令人嘑曰若胡為是應曰吾尤置去禾勿顧一以月晦日之丘井有水者以敝帚騷尤二七祝曰今日月晦騷尤北入帚井中一以月晦日日下餔時取凷大如鷄卵者男子七女子二七先以凷置室後令南北列以晦往之凷所禹步三道南方始取凷言曰凷言曰今日月晦靡尤北凷一靡已靡置凷其處去勿顧靡大者一以月晦日之內後曰今日晦弱又內北靡又內辟二七一以朔日葵莖靡又二七言曰今日朔靡又以葵戟有以殺本若道旁𢃬根二七投澤若淵下除日已望一祝尤以月晦日之室北靡宥男子七女子二七曰今日月晦靡宥室北不出一月宥已
