body:
  text: 傷痙傷痙痙者傷風入傷身信而不能詘治之鹽令黃取一斗裹以布卒醇酒中入即出蔽以市以尉頭熱則舉適下為裹更尉尉寒更鹽以尉尉勿絶一尉寒汗出汗出多能詘信止尉時及已尉四日內衣毋見風過四日自適尉先食後食次毋禁毋時令一傷而頸者以水財煮李實疾沸而抒浚取其汁寒和以飲病者飲以故節其病甚弗能飲者強啓其口為灌之節毋李實時煮炊飲其汁如其實數毋禁嘗試令一諸傷風入傷傷癰痛治以枲絮為獨傷漬彘膏煎汁沃數注下膏勿絶以歐寒氣舉以傅傷空𢅷休得為癰傅藥先食後食次毋禁毋時礜不盡一傷而頸者小𠟃一犬漰與薛半斗毋去其足以并盛漬井㡭出之陰乾百日即有頸者冶以三指一撮和以溫酒一咅飲之一傷脛者擇薤一把以敦酒半斗者沸飲之即溫衣陝坐四旁汗出到足乃己一冶黃黔甘草相半即以彘膏財足以煎之煎之沸即以布足之豫其汁傅
