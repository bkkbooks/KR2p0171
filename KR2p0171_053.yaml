body:
  text: 治㾺治㾺㾺者癰痛而潰㾺居右馬右頰骨左馬左頰骨燔冶之叔取汁灑以彘膏已湔者膏之而以冶馬頰骨傅布膏更裹再膏傅而灑以叔汁草日㾺己嘗試令一㾺㾺者有牝牡牡高膚牝有空治以丹為一合撓之以豬織膏和傅之有去者輒逋之勿灑面靤赤已一㾺㾺者癰而潰用良叔雷矢各而之以傅癰空中傅藥必先灑之日一灑傅藥傅藥六十日㾺筮取莓莖暴乾之毋已飲此得卧卧䁷更得已解弱乾莓用之根乾之剡取皮采根十斗以美
