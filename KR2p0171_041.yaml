body:
  text: 胻膫胻膫治胻膫取陳黍叔冶以犬膽和以傅一取無夷中𩅢冶豶膏以䊟熱膏沃冶中和以傅一取雉二孰者餘疾雞羽自解隋其尾皆燔冶取灰以豬膏和傅一夏日取堇葉冬日取其本皆以甘沮而封之乾輒封其上此皆已驗
